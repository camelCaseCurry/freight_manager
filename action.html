<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <title>Action Page</title>
</head>
<body>
  <h2>Welcome Driver, <span id="usernameDisplay"></span></h2>

  <h3>All Rate Confirmations</h3>
  <ul id="dataList"></ul>


<div>
<h3>Scan New File</h3>
<input id="pdfInput" type="file">
<br>
<input id="scanBtn" type="button" value="Scan"> <p id="scanLoadingText" display="none">  </p>
</div>


<div>
  <h3>Previous Scans</h3>
  <select id="scanDropdown">
    <option value="">-- Select a scan --</option>
  </select>
</div>

<div id="scanDetails" display ="none">
  <h4>PDF Link:</h4>
  <a id="pdfLink" href="#" target="_blank">Open PDF</a>

  <h4>Entities:</h4>
  <pre id="entitiesDisplay"></pre>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<h3>OCR Result</h3>
<pre id="ocrResult"></pre>
<button id="saveOCR">Save to My Data</button> <br><br><br>


<br><br><br>
 <input type="button" id = "logout" value="Log Out">
  <script type="module" src="src/action.js"></script>
</body>
</html>
